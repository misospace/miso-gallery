---
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Create test images directory
        run: mkdir -p /tmp/test_images

      - name: Create test image
        run: |
          python3 -c "
          from PIL import Image
          img = Image.new('RGB', (100, 100), color='red')
          img.save('/tmp/test_images/test.png')
          "

      - name: Build test image
        run: docker build -t miso-gallery:test .

      - name: Run container
        run: |
          docker run -d --name gallery -p 5000:5000 -v /tmp/test_images:/data miso-gallery:test
          sleep 5

      - name: Wait for app and run smoke test
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:5000/ >/dev/null; then
              echo "App is up"
              break
            fi
            echo "Waiting for app... ($i/20)"
            sleep 1
          done
          docker ps -a
          docker logs gallery || true
          curl -f http://localhost:5000/ || exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f gallery || true
