name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.4.6 or v0.4.6; will normalize to 0.4.6)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@6cbb3f0d4a7cd1e38b0f4e91f1d9a20bd6f2b0e5 # v2.1.4
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Normalize version
        id: version
        run: |
          set -euo pipefail
          RAW='${{ github.event.inputs.version }}'
          VERSION="${RAW#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $RAW"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "smurf-bot[bot]"
          git config user.email "smurf-bot[bot]@users.noreply.github.com"

      - name: Ensure app version constant matches release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os, re
          version = os.environ['VERSION']
          path = Path('app.py')
          text = path.read_text()
          updated, count = re.subn(r'APP_VERSION = \(os\.environ\.get\("APP_VERSION"\) or ".*?"\)\.strip\(\) or ".*?"', f'APP_VERSION = (os.environ.get("APP_VERSION") or "{version}").strip() or "{version}"', text, count=1)
          if count != 1:
              raise SystemExit('Failed to update APP_VERSION in app.py')
          path.write_text(updated)
          PY

      - name: Commit version bump
        run: |
          git add app.py
          if git diff --cached --quiet; then
            echo "No version file changes to commit"
          else
            git commit -m "chore(release): bump version to ${{ steps.version.outputs.version }}"
            git push origin HEAD:main
          fi

      - name: Ensure remote main is current
        run: |
          git fetch origin main --tags
          git checkout main
          git reset --hard origin/main

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
