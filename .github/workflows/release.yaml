---
name: Release
on:
  release:
    types:
      - published

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check APP_VERSION matches release tag
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(python3 - <<'PY'
            import importlib.util
            import os
            import sys
            from pathlib import Path

            sys.path.insert(0, str(Path.cwd()))
            spec = importlib.util.spec_from_file_location("app", "app.py")
            module = importlib.util.module_from_spec(spec)
            spec.loader.exec_module(module)
            version = module.APP_VERSION
            os.environ["APP_VERSION"] = version
            print(version)
          PY
          )
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: APP_VERSION ($VERSION) does not match release tag ($TAG)"
            echo "The APP_VERSION constant in app.py must be bumped to $TAG before releasing."
            exit 1
          fi
          echo "OK: APP_VERSION ($VERSION) matches release tag ($TAG)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Check for pre-built image from CI build
        id: prebuilt
        run: |
          if docker buildx imagetools inspect "ghcr.io/${{ github.repository }}:main-${GITHUB_SHA}" >dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Pre-built image main-${GITHUB_SHA} available; skipping rebuild."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No pre-built image; will build from source."
          fi

      - name: Build and push Docker image
        id: build
        if: steps.prebuilt.outputs.exists != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest from pre-built image
        if: steps.prebuilt.outputs.exists == 'true'
        run: |
          ARCH="${{ matrix.arch }}"
          mkdir -p ${{ runner.temp }}/digests
          DIGEST=$(docker buildx imagetools inspect --raw \
            "ghcr.io/${{ github.repository }}:main-${GITHUB_SHA}" 2>/dev/null \
            | jq -r --arg arch "$ARCH" \
              '.[] | select(.Descriptor.platform.architecture == $arch) | .Descriptor.digest')
          if [ -z "$DIGEST" ] || [ "$DIGEST" = "null" ]; then
            echo "::error::Could not locate $ARCH digest in pre-built main-${GITHUB_SHA} manifest."
            exit 1
          fi
          touch "${{ runner.temp }}/digests/${DIGEST#sha256:}"

      - name: Export digest
        if: steps.prebuilt.outputs.exists != 'true'
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04-arm
    needs: build
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |-
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<<"$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
